<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tennis Dashboard</title>

<style>

body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI";
background:#0e0e0e;
color:white;
text-align:center;
}

.header{
padding:16px;
font-size:22px;
font-weight:600;
}

.map{
position:relative;
max-width:800px;
margin:auto;
}

.map img{
width:100%;
border-radius:12px;
}

.court{
position:absolute;
border-radius:12px;
display:flex;
align-items:center;
justify-content:center;
font-weight:700;
color:white;
cursor:pointer;
}

/* COLORS */
.open{ background:rgba(0,200,0,0.75); }
.inuse{ background:rgba(220,0,0,0.85); }

/* TOP COURTS */
#c1{ top:14%; left:28%; width:90px; height:140px; }
#c2{ top:14%; left:52%; width:90px; height:140px; }

/* BOTTOM COURTS */
#c3{ top:55%; left:15%; width:80px; height:130px; }
#c4{ top:55%; left:33%; width:80px; height:130px; }
#c5{ top:55%; left:51%; width:80px; height:130px; }
#c6{ top:55%; left:69%; width:80px; height:130px; }

</style>
</head>

<body>

<div class="header">
🎾 Tennis Courts
</div>

<div class="map">

<img src="courts.png">

<div id="c1" class="court open" onclick="tapCourt(1)">1</div>
<div id="c2" class="court open" onclick="tapCourt(2)">2</div>

<div id="c3" class="court open" onclick="tapCourt(3)">3</div>
<div id="c4" class="court open" onclick="tapCourt(4)">4</div>
<div id="c5" class="court open" onclick="tapCourt(5)">5</div>
<div id="c6" class="court open" onclick="tapCourt(6)">6</div>

</div>

<script>

let courts={}

function tapCourt(n){

let el=document.getElementById("c"+n)

if(courts[n]){
if(confirm("Clear Court "+n+"?")){
courts[n]=null
el.classList.remove("inuse")
el.classList.add("open")
}
}else{
let players=prompt("Enter players (ex: Parker vs Daniel)")
if(players){
courts[n]=players
el.classList.remove("open")
el.classList.add("inuse")
}
}

}

</script>

</body>
</html>
