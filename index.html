<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tennis Team App</title>

<style>
body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI";
background:#0e0e0e;
color:white;
text-align:center;
}

.header{
padding:15px;
font-size:22px;
font-weight:600;
background:#000;
}

.map{
position:relative;
max-width:800px;
margin:auto;
}

.map img{
width:100%;
border-radius:12px;
}

/* COURTS */
.court{
position:absolute;
border-radius:14px;
display:flex;
align-items:center;
justify-content:center;
font-weight:700;
cursor:pointer;
color:white;
transition:.2s;
}

.open{ background:rgba(0,200,0,.75); }
.inuse{ background:rgba(220,0,0,.85); }

/* POSITIONS */
#c1{ top:14%; left:28%; width:90px; height:140px; }
#c2{ top:14%; left:52%; width:90px; height:140px; }

#c3{ top:55%; left:15%; width:80px; height:130px; }
#c4{ top:55%; left:33%; width:80px; height:130px; }
#c5{ top:55%; left:51%; width:80px; height:130px; }
#c6{ top:55%; left:69%; width:80px; height:130px; }

/* PANEL */
.panel{
background:#1c1c1e;
padding:15px;
margin-top:10px;
}

.roster{
display:flex;
flex-wrap:wrap;
gap:8px;
justify-content:center;
}

.player{
background:#007aff;
padding:6px 10px;
border-radius:8px;
cursor:pointer;
}

/* BUTTONS */
button{
padding:8px 12px;
border:none;
border-radius:8px;
margin:5px;
font-weight:600;
}

.start{background:#34c759;}
.clear{background:#ff3b30;}
.rotate{background:#ff9500;}

.timer{
font-size:20px;
margin-top:8px;
}
</style>
</head>

<body>

<div class="header">🎾 Tennis Practice</div>

<div class="map">

<!-- 🔥 FIXED IMAGE (replace with your own if you want) -->
<img src="https://upload.wikimedia.org/wikipedia/commons/9/9e/Tennis_court_surface.jpg">

<div id="c1" class="court open">1</div>
<div id="c2" class="court open">2</div>
<div id="c3" class="court open">3</div>
<div id="c4" class="court open">4</div>
<div id="c5" class="court open">5</div>
<div id="c6" class="court open">6</div>

</div>

<div class="panel">

<h3>Players</h3>
<div class="roster" id="roster"></div>

<button class="start" onclick="startTimer()">Start</button>
<button class="rotate" onclick="rotatePlayers()">Rotate</button>
<button class="clear" onclick="clearAll()">Clear</button>

<div class="timer" id="timer">0:00</div>

</div>

<script>

// PLAYERS (you can edit these)
let players = ["Parker","Emma","Player 3","Player 4","Player 5","Player 6"];

let selectedPlayer = null;
let time = 0;
let timerInterval;

// LOAD PLAYERS
function loadPlayers(){
let roster = document.getElementById("roster");
roster.innerHTML = "";

players.forEach(p=>{
let div = document.createElement("div");
div.className = "player";
div.innerText = p;

div.onclick = ()=>{
selectedPlayer = p;
document.querySelectorAll(".player").forEach(el=>el.style.opacity=".5");
div.style.opacity="1";
};

roster.appendChild(div);
});
}

loadPlayers();

// COURT CLICK
document.querySelectorAll(".court").forEach(court=>{
court.onclick = ()=>{
// toggle open/in use
if(court.classList.contains("open")){
court.classList.remove("open");
court.classList.add("inuse");

if(selectedPlayer){
court.innerText = selectedPlayer;
}
}else{
court.classList.remove("inuse");
court.classList.add("open");
court.innerText = court.id.replace("c","");
}
};
});

// TIMER
function startTimer(){
clearInterval(timerInterval);
time = 0;

timerInterval = setInterval(()=>{
time++;

let min = Math.floor(time/60);
let sec = time%60;

document.getElementById("timer").innerText =
min + ":" + (sec<10?"0":"") + sec;

},1000);
}

// ROTATE PLAYERS
function rotatePlayers(){
let courts = document.querySelectorAll(".court.inuse");
let names = [];

courts.forEach(c=>names.push(c.innerText));

names.unshift(names.pop()); // rotate

courts.forEach((c,i)=>{
c.innerText = names[i] || "";
});
}

// CLEAR
function clearAll(){
document.querySelectorAll(".court").forEach((c,i)=>{
c.classList.remove("inuse");
c.classList.add("open");
c.innerText = i+1;
});

clearInterval(timerInterval);
document.getElementById("timer").innerText = "0:00";
}

</script>

</body>
</html>
